project:
  type: website
  render:
    - "*.qmd"
    - "!rv/"

website:
  description: "Statistical modeling and causal inference, with applications in advertising effectiveness measurement."
  site-url: https://topazape.dev
  title: "topazape"
  navbar:
    left:
      - about.qmd
    right:
      - icon: github
        href: https://github.com/topazape
      - icon: twitter-x
        href: https://x.com/topazape
      - icon: linkedin
        href: https://www.linkedin.com/in/tomonori-kawai

format:
  html:
    include-in-header:
      text: |
        <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e8556caa0655498ab75398141db8f9de"}'></script><!-- End Cloudflare Web Analytics -->
    theme:
      - flatly
      - custom.scss
    mainfont: "Lora, serif"
    monofont: "Roboto Mono, monospace"
    css: styles.css

execute:
  freeze: auto
